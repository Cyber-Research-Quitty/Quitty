services:
  p1-sign-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p1-sign-service
    ports:
      - "8100:8100"
    environment:
      ENVIRONMENT: dev
      DEFAULT_ALG: ml-dsa-44
      KEYSTORE_PATH: data/p1-keystore.json
      # Default wired to local P2 host port for out-of-box export from containerized P1.
      P2_EXPORT_URL: ${P2_EXPORT_URL:-http://host.docker.internal:8200/internal/keys/import}
      P2_DELETE_URL: ${P2_DELETE_URL:-http://host.docker.internal:8200/internal/keys}
      P2_TIMEOUT_SECONDS: 3.0
      P2_ADMIN_API_KEY: ${P2_ADMIN_API_KEY:-dev-admin-key}
      P4_REVOKE_URL: ${P4_REVOKE_URL:-http://host.docker.internal:8400/revoke}
      P4_TOKEN_SYNC_URL: ${P4_TOKEN_SYNC_URL:-http://host.docker.internal:8400/v1/tokens/sync}
      P4_TIMEOUT_SECONDS: 3.0
    volumes:
      # Persist generated signing keys on the host.
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=2).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
