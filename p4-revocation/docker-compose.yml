services:
  p4-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p4-api
    ports:
      - "8400:8400"
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP: kafka:9092
      ACCESS_TOKEN_PROVIDER: p1
      P1_SIGN_BASE_URL: ${P1_SIGN_BASE_URL:-http://host.docker.internal:8100}
      P1_ACCESS_TOKEN_ALG: ml-dsa-44
      JWT_ISSUER: p4-revocation-service
    depends_on:
      - redis
      - kafka
    restart: unless-stopped

  p4-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p4-consumer
    command: ["python", "-m", "consumer"]
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP: kafka:9092
      CONSUMER_GROUP_ID: revocation-consumers
      CONSUMER_OFFSET_RESET: latest
    depends_on:
      - redis
      - kafka
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: p4-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: p4-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: p4-kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-localhost}:${KAFKA_EXTERNAL_PORT:-29092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
