services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ejwks-api:
    build: .
    ports:
      - "8200:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_DB_PATH=/data/keys.db
      - ROOT_SIGNER=ml-dsa-44
      - ROOT_SIGNER_KEY_PATH=/data/root_signer_key.json
      - LOG_SIGNER=ml-dsa-44
      - LOG_SIGNER_KEY_PATH=/data/log_signer_key.json
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-admin-key}
      - BLOOM_BITS=1048576
      - BLOOM_HASHES=7
      - BLOOM_ENABLED=${BLOOM_ENABLED:-true}
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  client-verify-service:
    build:
      context: .
      dockerfile: client-verify/Dockerfile
    ports:
      - "8201:8201"
    environment:
      - CLIENT_VERIFY_P2_BASE_URL=http://ejwks-api:8000
      - CLIENT_VERIFY_KEY_FILE=/data/root_signer_key.json
    volumes:
      - ./data:/data:ro
    depends_on:
      - ejwks-api
    restart: unless-stopped

volumes:
  redis-data:

# To Run: docker compose up -d
# To View Logs: docker compose logs -f ejwks-api
# To Stop: docker compose down
