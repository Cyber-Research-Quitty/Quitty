services:
  auth:
    build: ./auth
    environment:
      ACCESS_TOKEN_TTL_MINUTES: 60
      AUTH_DB_PATH: /data/auth.db
      JWT_ISSUER: p4-revocation-service
      P1_SIGN_URL: http://host.docker.internal:8100/sign
      P1_SIGN_ALG: ml-dsa-44
      P3_VALIDATE_URL: http://host.docker.internal:8300/guard/validate
      P4_REVOKE_URL: http://host.docker.internal:8400/revoke
      TOKEN_TIMEOUT_SECONDS: 5
    ports:
      - '8001:8001'
    volumes:
      - auth_data:/data

  db:
    build: ./db
    environment:
      DATABASE_URL: sqlite:////data/cart.db
    ports:
      - '8002:8002'
    volumes:
      - cart_data:/data

  cart:
    build: ./cart
    environment:
      DB_SERVICE_URL: http://db:8002
      P3_VALIDATE_URL: http://host.docker.internal:8300/guard/validate
      TOKEN_TIMEOUT_SECONDS: 5
    ports:
      - '8003:8003'
    depends_on:
      - auth
      - db

  product:
    build: ./product
    ports:
      - '8004:8004'

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001
      NEXT_PUBLIC_CART_API_URL: http://localhost:8003
      NEXT_PUBLIC_PRODUCT_API_URL: http://localhost:8004
    ports:
      - '3000:3000'
    depends_on:
      - auth
      - cart
      - product

volumes:
  auth_data:
  cart_data:
